
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Phoneme Frequency Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d30 100%);
            color: #ffffff;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #007AFF;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 30px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #0056b3;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .header h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(45deg, #007AFF, #00D4FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            font-size: 1.2rem;
            color: #8E8E93;
            margin: 10px 0 0 0;
        }
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .admin-item {
            background: rgba(58, 58, 60, 0.6);
            border: 1px solid rgba(84, 84, 88, 0.4);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.2s ease;
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .admin-item:hover {
            background: rgba(78, 78, 80, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        .admin-icon {
            font-size: 32px;
            min-width: 32px;
        }
        .admin-content {
            flex: 1;
        }
        .admin-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #ffffff;
        }
        .admin-description {
            font-size: 14px;
            color: #8E8E93;
            line-height: 1.4;
        }
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            display: none;
        }
        .alert-success {
            background-color: rgba(40, 167, 69, 0.2);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #28a745;
        }
        .alert-error {
            background-color: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #dc3545;
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .admin-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .admin-item {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('main_menu') }}" class="back-link">
            ← Back
        </a>

        <div class="header">
            <h1>🛠️ Admin Panel</h1>
            <p>Manage phonemes, frequencies, and system settings</p>
        </div>

        <div id="alert-container"></div>

        <div class="admin-grid">
            <a href="{{ url_for('admin_phonemes') }}" class="admin-item">
                <span class="admin-icon">🔧</span>
                <div class="admin-content">
                    <div class="admin-title">Manage Phonemes</div>
                    <div class="admin-description">Add, edit, delete phonemes</div>
                </div>
            </a>

            <a href="{{ url_for('admin_templates') }}" class="admin-item">
                <span class="admin-icon">📄</span>
                <div class="admin-content">
                    <div class="admin-title">Phoneme Templates</div>
                    <div class="admin-description">Export and import phoneme sets</div>
                </div>
            </a>

            <a href="#" onclick="resetDatabase()" class="admin-item">
                <span class="admin-icon">🔄</span>
                <div class="admin-content">
                    <div class="admin-title">Reset Database</div>
                    <div class="admin-description">Clear all data and start fresh</div>
                </div>
            </a>
        </div>
    </div>

    <script>
        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            alertContainer.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        async function resetDatabase() {
            if (!confirm('This will reset all phonemes to default configuration and delete all words. Are you sure?')) {
                return;
            }

            try {
                const response = await fetch('/api/admin/reset-database', {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Database reset successfully!');
                } else {
                    showAlert(result.error || 'Failed to reset database', 'error');
                }
            } catch (error) {
                showAlert('Error resetting database: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
