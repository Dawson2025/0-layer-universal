[tool:pytest]
# Pytest configuration for Firebase instance tests
# Follows project testing standards and conventions

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    slow: Tests that take longer to run
    firebase: Firebase-specific tests
    provider: Firebase provider tests
    config: Firebase configuration tests

# Test execution
addopts = 
    --strict-markers
    --disable-warnings
    --tb=short
    --verbose
    --color=yes
    --durations=10

# Coverage settings
# Note: Coverage is enabled via command line with --cov flag
# This ensures compatibility with different test runners

# Async test support
asyncio_mode = auto

# Test timeout (in seconds)
timeout = 300

# Minimum version requirements
minversion = 6.0

# Test collection
collect_ignore = [
    "setup.py",
    "conftest.py",
    "run_tests.py"
]

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:matplotlib.*
    ignore::UserWarning:networkx.*

# Test output
console_output_style = progress
