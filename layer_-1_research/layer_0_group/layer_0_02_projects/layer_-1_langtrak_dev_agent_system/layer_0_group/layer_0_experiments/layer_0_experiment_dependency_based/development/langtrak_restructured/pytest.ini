[tool:pytest]
# Pytest configuration for Language Tracker project
# Following project constitution standards

# Test discovery
testpaths = 
    features/meta-intelligent-orchestration/instances/tests
    features/meta-intelligent-orchestration/core/tests
    tests
norecursedirs = scripts/manual_tests
python_files = test_*.py *_test.py test_firebase_auth.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 6.0

# Add options
# Note: To run tests locally without coverage, use: pytest --no-cov
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=app
    --cov=main
    --cov=core
    --cov=services
    --cov=routes
    --cov=features
    --cov=scripts
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=90
    --junitxml=test-results.xml
    --maxfail=5

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    firebase: Firebase-specific tests
    auth: Authentication tests
    visual: Visual orchestration tests
    meta: Meta-intelligent orchestration tests
    browser: Browser automation tests
    project_analysis: Project analysis tests
    emulator: Tests that use Firebase emulators
    real_firebase: Tests that connect to real Firebase services
    dev: Development environment tests
    staging: Staging environment tests
    production: Production environment tests
    smoke: Smoke tests (critical path verification)
    user_story: User story validation tests

# Coverage configuration
[coverage:run]
source = 
    app.py
    main.py
    core
    services
    routes
    features
    scripts
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */.venv/*
    */env/*
    */site-packages/*
    */migrations/*
    */node_modules/*
    */conftest.py
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml