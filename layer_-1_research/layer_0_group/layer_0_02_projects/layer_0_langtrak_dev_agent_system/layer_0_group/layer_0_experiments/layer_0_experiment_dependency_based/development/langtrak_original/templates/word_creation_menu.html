<html lang="en">
<head>

    <title>Word Creation Menu - Lang Trak</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;

        }
        .content {
            padding: 40px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .menu-item {
            display: block;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 8px;

            color: #333;
            transition: all 0.3s ease;

        .menu-item:hover {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .menu-item h3 {
            margin: 0 0 10px 0;
            color: #667eea;
            font-size: 1.3em;
        }
        .menu-item p {
            margin: 0;
            color: #666;
            line-height: 1.5;
        }
        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 20px;
            transition: background 0.3s ease;
        }
        .back-button:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>

    <div class="container">

    </div>
