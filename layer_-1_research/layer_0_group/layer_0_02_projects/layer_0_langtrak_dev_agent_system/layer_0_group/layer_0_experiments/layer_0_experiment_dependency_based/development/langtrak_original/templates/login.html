<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Phoneme Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            max-width: 400px;
            width: 100%;
            background: rgba(58, 58, 60, 0.6);
            border: 1px solid rgba(84, 84, 88, 0.4);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(20px);
            text-align: center;
        }
        
        
        .css-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px auto;
            border-radius: 16px;
            background: linear-gradient(135deg, #007AFF 0%, #5AC8FA 50%, #30D158 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .css-logo::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            50% { transform: translateX(100%) translateY(100%) rotate(45deg); }
            100% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(90deg, #007AFF, #5AC8FA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-subtitle {
            font-size: 16px;
            color: #8E8E93;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-weight: 600;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(84, 84, 88, 0.6);
            border-radius: 8px;
            background: rgba(44, 44, 46, 0.8);
            color: #ffffff;
            font-size: 16px;
            transition: border-color 0.2s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #007AFF;
        }
        
        .form-input::placeholder {
            color: #8E8E93;
        }
        
        .form-button {
            width: 100%;
            padding: 14px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 16px;
        }
        
        .form-button:hover {
            background: #0056CC;
        }
        
        .form-button:disabled {
            background: #8E8E93;
            cursor: not-allowed;
        }
        
        .auth-links {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(84, 84, 88, 0.4);
        }
        
        .auth-link {
            color: #007AFF;
            text-decoration: none;
            font-weight: 600;
            margin: 0 8px;
        }
        
        .auth-link:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert-error {
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid rgba(255, 69, 58, 0.3);
            color: #FF453A;
        }
        
        .alert-success {
            background: rgba(48, 209, 88, 0.1);
            border: 1px solid rgba(48, 209, 88, 0.3);
            color: #30D158;
        }
        
        .tab-container {
            display: flex;
            margin-bottom: 24px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(44, 44, 46, 0.6);
        }
        
        .tab-button {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #8E8E93;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .tab-button.active {
            background: #007AFF;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .firebase-button {
            width: 100%;
            padding: 14px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .firebase-button:hover {
            background: #3367d6;
        }
        
        .firebase-button:disabled {
            background: #8E8E93;
            cursor: not-allowed;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #8E8E93;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(84, 84, 88, 0.4);
        }
        
        .divider span {
            background: rgba(58, 58, 60, 0.6);
            padding: 0 16px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="css-logo">PT</div>
        <h1 class="login-title">🔐 Welcome</h1>
        <p class="login-subtitle">Sign in to your account or create a new one</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'error' if category == 'error' else 'success' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="tab-container">
            <button class="tab-button active" onclick="showTab('login')">Sign In</button>
            <button class="tab-button" onclick="showTab('register')">Sign Up</button>
        </div>
        
        <!-- Login Form -->
        <div id="login-tab" class="tab-content active">
            <!-- Firebase Google Sign In -->
            <button type="button" id="google-signin-btn" class="firebase-button">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="white" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="white" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="white" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="white" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </button>
            
            <div class="divider">
                <span>or</span>
            </div>
            
            <!-- Traditional Email/Password Login -->
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                    >
                </div>
                
                <button type="submit" class="form-button">Sign In with Email</button>
            </form>
        </div>
        
        <!-- Register Form -->
        <div id="register-tab" class="tab-content">
            <!-- Firebase Google Sign Up -->
            <button type="button" id="google-signup-btn" class="firebase-button">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="white" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="white" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="white" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="white" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign up with Google
            </button>
            
            <div class="divider">
                <span>or</span>
            </div>
            
            <!-- Traditional Email/Password Registration -->
            <form id="register-form">
                <div class="form-group">
                    <label class="form-label" for="reg-username">Username</label>
                    <input 
                        type="text" 
                        id="reg-username" 
                        name="username" 
                        class="form-input" 
                        placeholder="Choose a username"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="reg-email">Email</label>
                    <input 
                        type="email" 
                        id="reg-email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="reg-password">Password</label>
                    <input 
                        type="password" 
                        id="reg-password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Create a password (min 6 characters)"
                        required
                        minlength="6"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        name="confirm_password" 
                        class="form-input" 
                        placeholder="Confirm your password"
                        required
                    >
                </div>
                
                <button type="submit" class="form-button">Create Account</button>
            </form>
        </div>
        
        <div class="auth-links">
            <a href="{{ url_for('index') }}" class="auth-link">← Back to Home</a>
        </div>
    </div>

    <!-- Firebase Configuration -->
    <script>
        window.FIREBASE_CONFIG = {{ firebase_config | tojson }};
    </script>
    
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <!-- Firebase Authentication -->
    <script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
    
    <script>
        function showTab(tabName) {
            // Hide all tab contents
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active'));
            
            // Remove active class from all buttons
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(button => button.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            
            // Add active class to clicked button
            event.target.classList.add('active');
        }
        
        // Password confirmation validation
        document.getElementById('confirm-password').addEventListener('input', function() {
            const password = document.getElementById('reg-password').value;
            const confirm = this.value;
            
            if (password !== confirm) {
                this.setCustomValidity('Passwords do not match');
            } else {
                this.setCustomValidity('');
            }
        });
        
        // Wait for Firebase to be ready
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                if (window.firebaseAuth) {
                    // Google Sign In for Login
                    document.getElementById('google-signin-btn').addEventListener('click', function() {
                        this.disabled = true;
                        this.textContent = 'Signing in...';
                        window.firebaseAuth.signInWithGoogle().catch(function() {
                            this.disabled = false;
                            this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24"><path fill="white" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="white" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="white" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="white" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Sign in with Google';
                        }.bind(this));
                    });
                    
                    // Google Sign Up for Registration
                    document.getElementById('google-signup-btn').addEventListener('click', function() {
                        this.disabled = true;
                        this.textContent = 'Signing up...';
                        window.firebaseAuth.signInWithGoogle().catch(function() {
                            this.disabled = false;
                            this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24"><path fill="white" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="white" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="white" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="white" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Sign up with Google';
                        }.bind(this));
                    });
                } else {
                    console.log('Firebase not ready yet');
                }
            }, 1000);
        });
        
        // Handle form submissions
        function setupFormHandlers() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const email = document.getElementById('email');
                    const password = document.getElementById('password');
                    
                    if (!email || !password) {
                        console.error('Login form elements not found');
                        return;
                    }
                    
                    if (window.firebaseAuth && window.firebaseAuth.signInWithEmail) {
                        window.firebaseAuth.signInWithEmail(email.value, password.value)
                            .catch(error => {
                                console.error('Login error:', error);
                                alert('Login failed: ' + error.message);
                            });
                    } else {
                        console.error('Firebase Auth not available');
                        alert('Firebase Auth not available. Please refresh the page.');
                    }
                });
            }
            
            if (registerForm) {
                registerForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    console.log('Registration form submitted');
                    const username = document.getElementById('reg-username');
                    const email = document.getElementById('reg-email');
                    const password = document.getElementById('reg-password');
                    const confirmPassword = document.getElementById('confirm-password');
                    
                    console.log('Form elements:', { username, email, password, confirmPassword });
                    
                    if (!username || !email || !password || !confirmPassword) {
                        console.error('Registration form elements not found');
                        console.log('Available elements:', document.querySelectorAll('input'));
                        return;
                    }
                    
                    if (password.value !== confirmPassword.value) {
                        alert('Passwords do not match');
                        return;
                    }
                    
                    if (window.firebaseAuth && window.firebaseAuth.signUpWithEmail) {
                        window.firebaseAuth.signUpWithEmail(email.value, password.value, username.value)
                            .catch(error => {
                                console.error('Registration error:', error);
                                alert('Registration failed: ' + error.message);
                            });
                    } else {
                        console.error('Firebase Auth not available');
                        alert('Firebase Auth not available. Please refresh the page.');
                    }
                });
            }
        }
        
        // Setup form handlers when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setupFormHandlers);
        } else {
            setupFormHandlers();
        }
    </script>
</body>
</html>
